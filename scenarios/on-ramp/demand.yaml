metadata:
  name: Editor Demand
  time_unit: seconds
vehicle_classes:
  - id: car
    length: 4.5
    min_gap: 2
    max_speed: 33.333333333333336
    max_acceleration: 3
    max_deceleration: -6
    comfortable_deceleration: 2
    car_following_model: idm
    lane_changing_model: lmrs
    reaction_time: 1
    model_params:
      idm:
        desired_speed: 100
        b: 2.5
flows:
  - od:
      origin: N0
      destination: N2
    rate: 1500
    class: car
    distribution: deterministic
  - od:
      origin: N3
      destination: N2
    rate: 500
    class: car
    distribution: deterministic
