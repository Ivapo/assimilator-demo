flows:
  - od: { origin: W, destination: E }
    rate: 600
    class: car
    window: { start: 0, end: 300 }
    distribution: deterministic
    route_choice: shortest
  - od: { origin: S, destination: E }
    rate: 200
    class: car
    window: { start: 0, end: 300 }
    distribution: deterministic
    route_choice: shortest

stochastic:
  speed_variation: 0
  headway_variation: 0
  reaction_time_variation: 0
